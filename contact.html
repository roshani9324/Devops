<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - 2D Animation Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <a class="brand" href="index.html">2D Motion</a>
            <nav class="site-nav">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a class="active" href="contact.html">Contact</a>
            </nav>
        </header>

        <main class="content-panel contact-panel">
            <section class="contact-hero">
                <div class="contact-shapes">
                    <div class="contact-shape contact-shape-1"></div>
                    <div class="contact-shape contact-shape-2"></div>
                    <div class="contact-shape contact-shape-3"></div>
                </div>
                <h1>Get in Touch</h1>
                <p>We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
            </section>

            <div class="contact-container">
                <form class="contact-form" id="contactForm">
                    <div class="form-group animate-in-1">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                        <div class="input-underline"></div>
                    </div>

                    <div class="form-group animate-in-2">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        <div class="input-underline"></div>
                    </div>

                    <div class="form-group animate-in-3">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="How can we help?" required>
                        <div class="input-underline"></div>
                    </div>

                    <div class="form-group animate-in-4">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Tell us more..." rows="6" required></textarea>
                        <div class="input-underline"></div>
                    </div>

                    <button type="submit" class="submit-btn pulse-btn">Send Message</button>
                </form>

                <div class="contact-info animate-in-5">
                    <div class="info-card">
                        <h3>Email</h3>
                        <p>hello@2dmotion.com</p>
                    </div>
                    <div class="info-card">
                        <h3>Phone</h3>
                        <p>+1 (555) 123-4567</p>
                    </div>
                    <div class="info-card">
                        <h3>Location</h3>
                        <p>San Francisco, CA</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
